{% extends 'base.html' %}

{% block title %}Keyboard shortcuts{% endblock %}
{% block header %}Shortcuts{% endblock %}

{% block body %}

<form method="POST">

  <table class="settingstable">

    <tr>
      <td>
        <h2>Shortcuts</h2>
      </td>
    </tr>

    {% for k, v in settings.items() %}
    <tr>
      <td>{{ setting_descs[k] or k}}</td>
      <td><input class="shortcutdefinition" name="{{k}}" id="{{k}}" value="{{ v }}" readonly></td>
    </tr>
    {% endfor %}

  </table>

  <div style="margin-top:40px;">
    <button type="submit" class="btn btn-primary">Save</button>
    <button class="btn" onclick="window.location = '/'">Cancel</button>
  </div>
</form>


<script>

  let _check_dups = function() {
    let values = {};
        
    $('.shortcutdefinition').each(function() {
      const val = $(this).val().trim();
      if (values[val]) {
        values[val]++;
      } else {
        values[val] = 1;
      }
    });

    // Highlight any dups.
    $('.shortcutdefinition').each(function() {
      const val = $(this).val().trim();
      if (values[val] > 1) {
        $(this).addClass('dupShortcut');
      } else {
        $(this).removeClass('dupShortcut');
      }
    });
  };

  let _add_keyentry_handlers = function() {
    $(".shortcutdefinition").keydown(function(event) {
      event.preventDefault();
      console.log('Key pressed: ' + event.key);
      $(this).val(event.key);
      _check_dups();
    });
  };

  $(document).ready(function () {
    _add_keyentry_handlers();
  });

</script>

{% endblock %}
